<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị - Minh Laptop </title>
    <script src="style.js"></script>
    
</head>
<body class="bg-white text-gray-900">
    <div class="container mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row gap-8">
           
            <aside class="w-full md:w-64 space-y-4">
                <div class="p-6 bg-gray-900 text-white rounded-3xl space-y-6">
                    <h2 class="text-xl font-bold">Dashboard</h2>
                    <nav class="space-y-2">
                        <button onclick="switchTab('products')" id="tab-products" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold bg-blue-600">Sản phẩm</button>
                        <button onclick="switchTab('orders')" id="tab-orders" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold hover:bg-white/10">Đơn hàng</button>
                    </nav>
                </div>
            </aside>

            <!-- Main  -->
            <main class="flex-1 space-y-6">
                <div class="flex items-center justify-between">
                    <h1 id="admin-title" class="text-3xl font-bold">Quản lý sản phẩm</h1>
                    <button id="add-btn" onclick="openModal()" class="px-6 py-3 bg-blue-600 text-white rounded-2xl font-bold flex items-center gap-2">Thêm sản phẩm</button>
                </div>

                <div id="admin-content" class="bg-white border rounded-3xl overflow-hidden">
                    <!-- Content -->
                </div>
            </main>
        </div>
    </div>

    
    <div id="product-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] overflow-hidden shadow-2xl">
            <div class="p-8 border-b flex items-center justify-between">
                <h3 id="modal-title" class="text-2xl font-bold">Thêm sản phẩm</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-gray-100 rounded-full">X</button>
            </div>
            <form id="product-form" class="p-8 space-y-6 max-h-[70vh] overflow-y-auto">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold">Tên sản phẩm</label>
                        <input required id="p-name" class="w-full px-4 py-3 border rounded-xl">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold">Giá (VNĐ)</label>
                        <input required id="p-price" type="number" class="w-full px-4 py-3 border rounded-xl">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold">Danh mục</label>
                        <input required id="p-category" class="w-full px-4 py-3 border rounded-xl">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold">CPU</label>
                        <input required id="p-cpu" class="w-full px-4 py-3 border rounded-xl">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold">Link hình ảnh</label>
                    <input id="p-image" class="w-full px-4 py-3 border rounded-xl">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold">Mô tả</label>
                    <textarea id="p-desc" class="w-full px-4 py-3 border rounded-xl h-48"></textarea>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 border-2 rounded-2xl font-bold">Hủy</button>
                    <button type="submit" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        let activeTab = 'products';
        let editingId = null;

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('tab-products').className = `w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold ${tab === 'products' ? 'bg-blue-600' : 'hover:bg-white/10'}`;
            document.getElementById('tab-orders').className = `w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold ${tab === 'orders' ? 'bg-blue-600' : 'hover:bg-white/10'}`;
            document.getElementById('admin-title').textContent = tab === 'products' ? 'Quản lý sản phẩm' : 'Quản lý đơn hàng';
            document.getElementById('add-btn').style.display = tab === 'products' ? 'flex' : 'none';
            renderAdminContent();
        }

        function renderAdminContent() {
            const content = document.getElementById('admin-content');
            if (activeTab === 'products') {
                const products = JSON.parse(localStorage.getItem('db_products'));
                let html = '<table class="w-full text-left"><thead class="bg-gray-50 border-b"><tr><th class="px-6 py-4">Sản phẩm</th><th class="px-6 py-4">Giá</th><th class="px-6 py-4">Thao tác</th></tr></thead><tbody class="divide-y">';
                products.forEach(p => {
                    html += `
                        <tr>
                            <td class="px-6 py-4 flex items-center gap-4">
                                <img src="${p.image}" class="w-12 h-12 rounded-lg object-cover">
                                <div><p class="font-bold text-sm">${p.name}</p></div>
                            </td>
                            <td class="px-6 py-4 font-bold text-sm">${formatCurrency(p.price)}</td>
                            <td class="px-6 py-4">
                                <button onclick="editProduct('${p.id}')" class="text-blue-600 mr-4">Sửa</button>
                                <button onclick="deleteProduct('${p.id}')" class="text-red-600">Xóa</button>
                            </td>
                        </tr>
                    `;
                });
                html += '</tbody></table>';
                content.innerHTML = html;
            } else {
                const orders = JSON.parse(localStorage.getItem('orders') || '[]');
                if (orders.length === 0) {
                    content.innerHTML = '<p class="p-10 text-center text-gray-500">Chưa có đơn hàng nào.</p>';
                    return;
                }
                let html = '<div class="p-6 space-y-4">';
                orders.forEach(o => {
                    html += `
                        <div class="border p-4 rounded-2xl">
                            <p class="font-bold">Đơn hàng #${o.id}</p>
                            <p class="text-sm text-gray-500">Khách hàng: ${o.customerInfo.name} - ${o.customerInfo.phone}</p>
                            <p class="text-blue-600 font-bold">Tổng: ${formatCurrency(o.total)}</p>
                        </div>
                    `;
                });
                html += '</div>';
                content.innerHTML = html;
            }
        }

        function openModal() {
            document.getElementById('product-modal').classList.remove('hidden');
            document.getElementById('modal-title').textContent = editingId ? 'Sửa sản phẩm' : 'Thêm sản phẩm';
        }

        function closeModal() {
            document.getElementById('product-modal').classList.add('hidden');
            document.getElementById('product-form').reset();
            editingId = null;
        }

        function editProduct(id) {
            const products = JSON.parse(localStorage.getItem('db_products'));
            const p = products.find(p => p.id === id);
            if (p) {
                editingId = id;
                document.getElementById('p-name').value = p.name;
                document.getElementById('p-price').value = p.price;
                document.getElementById('p-category').value = p.category;
                document.getElementById('p-cpu').value = p.cpu;
                document.getElementById('p-image').value = p.image;
                document.getElementById('p-desc').value = p.description;
                openModal();
            }
        }

        function deleteProduct(id) {
            if (confirm('Xóa sản phẩm này?')) {
                let products = JSON.parse(localStorage.getItem('db_products'));
                products = products.filter(p => p.id !== id);
                localStorage.setItem('db_products', JSON.stringify(products));
                renderAdminContent();
            }
        }

        document.getElementById('product-form').onsubmit = (e) => {
            e.preventDefault();
            let products = JSON.parse(localStorage.getItem('db_products'));
            const productData = {
                id: editingId || Date.now().toString(),
                name: document.getElementById('p-name').value,
                price: Number(document.getElementById('p-price').value),
                category: document.getElementById('p-category').value,
                cpu: document.getElementById('p-cpu').value,
                image: document.getElementById('p-image').value || './images',
                description: document.getElementById('p-desc').value,
                ram: '16GB', ssd: '512GB' 
            };

            if (editingId) {
                products = products.map(p => p.id === editingId ? productData : p);
            } else {
                products.push(productData);
            }

            localStorage.setItem('db_products', JSON.stringify(products));
            closeModal();
            renderAdminContent();
        };

        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (!user || user.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }
            renderAdminContent();
        });
    </script>
</body>
</html>
