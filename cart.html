<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Giỏ hàng - Minh Laptop </title>
        <script src="style.js"></script>
    
</head>
<body class="bg-white text-gray-900">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-8">Giỏ hàng của bạn</h1>
        <div id="cart-container" class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <!-- Cart  -->
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        function updateQty(id, delta) {
            let cart = getCart();
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity = Math.max(1, item.quantity + delta);
                saveCart(cart);
                renderCart();
            }
        }

        function removeCartItem(id) {
            let cart = getCart();
            cart = cart.filter(i => i.id !== id);
            saveCart(cart);
            renderCart();
        }

        function renderCart() {
            const cart = getCart();
            const container = document.getElementById('cart-container');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="col-span-3 py-20 text-center space-y-6">
                        <h2 class="text-3xl font-bold">Giỏ hàng trống</h2>
                        <a href="products.html" class="inline-block px-8 py-3 bg-blue-600 text-white rounded-full font-bold">Tiếp tục mua sắm</a>
                    </div>
                `;
                return;
            }

            const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

            let itemsHTML = '<div class="lg:col-span-2 space-y-6">';
            cart.forEach(item => {
                itemsHTML += `
                    <div class="flex flex-col sm:flex-row items-center gap-6 p-6 bg-white border rounded-3xl">
                        <div class="w-32 h-32 rounded-2xl overflow-hidden shrink-0">
                            <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1 space-y-2 text-center sm:text-left">
                            <h3 class="font-bold text-lg">${item.name}</h3>
                            <p class="text-blue-600 font-bold">${formatCurrency(item.price)}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="flex items-center border rounded-full px-2 py-1">
                                <button onclick="updateQty('${item.id}', -1)" class="p-1 hover:bg-gray-100 rounded-full">-</button>
                                <span class="w-8 text-center font-bold">${item.quantity}</span>
                                <button onclick="updateQty('${item.id}', 1)" class="p-1 hover:bg-gray-100 rounded-full">+</button>
                            </div>
                            <button onclick="removeCartItem('${item.id}')" class="p-2 text-red-500 hover:bg-red-50 rounded-full">Xóa</button>
                        </div>
                    </div>
                `;
            });
            itemsHTML += '</div>';

            const summaryHTML = `
                <div class="space-y-6">
                    <div class="p-8 bg-gray-50 rounded-3xl border space-y-6">
                        <h3 class="text-xl font-bold">Tổng đơn hàng</h3>
                        <div class="space-y-4 text-sm">
                            <div class="flex justify-between">
                                <span class="text-gray-500">Tạm tính:</span>
                                <span class="font-bold">${formatCurrency(total)}</span>
                            </div>
                            <div class="pt-4 border-t flex justify-between text-lg">
                                <span class="font-bold">Tổng cộng:</span>
                                <span class="font-bold text-blue-600">${formatCurrency(total)}</span>
                            </div>
                        </div>
                        <a href="checkout.html" class="block w-full py-4 bg-blue-600 text-white text-center rounded-2xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200">
                            Thanh toán ngay
                        </a>
                    </div>
                </div>
            `;

            container.innerHTML = itemsHTML + summaryHTML;
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
