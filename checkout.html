<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Thanh toán - Minh Laptop </title>
    <script src="style.js"></script>
    <style>
        
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            scroll-behavior: smooth;
        }

        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

       
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="bg-white text-gray-900">
    <div id="checkout-container" class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-8">Thanh toán</h1>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <!-- nhap form -->
            <div class="space-y-8">
                <form id="checkout-form" class="space-y-6">
                    <div class="p-8 bg-white border rounded-3xl space-y-6">
                        <h3 class="text-xl font-bold">Thông tin giao hàng</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-sm font-medium text-gray-700">Họ và tên</label>
                                <input required type="text" id="name" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Nguyễn Văn A">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-medium text-gray-700">Số điện thoại</label>
                                <input required type="tel" id="phone" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="0901 234 567">
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-gray-700">Địa chỉ nhận hàng</label>
                            <input required type="text" id="address" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Số nhà, tên đường...">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-gray-700">Email</label>
                            <input type="email" id="email" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="example@gmail.com">
                        </div>
                    </div>
                    <button type="submit" class="w-full py-5 bg-blue-600 text-white rounded-3xl font-bold text-lg hover:bg-blue-700 transition-all shadow-xl shadow-blue-200">
                        Xác nhận đặt hàng
                    </button>
                </form>
            </div>

            
            <div id="order-summary" class="space-y-8">
               
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cart = getCart();
            if (cart.length === 0) {
                window.location.href = 'cart.html';
                return;
            }

            const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            const user = getCurrentUser();
            if (user) {
                document.getElementById('name').value = user.name;
                document.getElementById('email').value = user.email;
            }

            const summaryHTML = `
                <div class="p-8 bg-gray-50 rounded-3xl border space-y-6 sticky top-24">
                    <h3 class="text-xl font-bold">Tóm tắt đơn hàng</h3>
                    <div class="space-y-4 max-h-[400px] overflow-y-auto pr-2">
                        ${cart.map(item => `
                            <div class="flex gap-4">
                                <div class="w-16 h-16 rounded-xl overflow-hidden shrink-0 border">
                                    <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover">
                                </div>
                                <div class="flex-1 text-sm">
                                    <p class="font-bold line-clamp-1">${item.name}</p>
                                    <p class="text-gray-500">Số lượng: ${item.quantity}</p>
                                    <p class="text-blue-600 font-bold">${formatCurrency(item.price * item.quantity)}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="pt-6 border-t space-y-3">
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">Tạm tính:</span>
                            <span class="font-bold">${formatCurrency(total)}</span>
                        </div>
                        <div class="pt-4 border-t flex justify-between text-xl">
                            <span class="font-bold">Tổng cộng:</span>
                            <span class="font-bold text-blue-600">${formatCurrency(total)}</span>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('order-summary').innerHTML = summaryHTML;

            document.getElementById('checkout-form').onsubmit = (e) => {
                e.preventDefault();
                const order = {
                    id: Math.random().toString(36).substr(2, 9).toUpperCase(),
                    userId: user ? user.id : 'guest',
                    items: cart,
                    total,
                    status: 'pending',
                    customerInfo: {
                        name: document.getElementById('name').value,
                        phone: document.getElementById('phone').value,
                        address: document.getElementById('address').value
                    },
                    createdAt: new Date().toISOString()
                };

                const orders = JSON.parse(localStorage.getItem('orders') || '[]');
                orders.push(order);
                localStorage.setItem('orders', JSON.stringify(orders));
                localStorage.removeItem('cart');
                
                document.getElementById('checkout-container').innerHTML = `
                    <div class="text-center py-20 space-y-8 max-w-2xl mx-auto">
                        <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto">
                        </div>
                        <h1 class="text-4xl font-extrabold tracking-tight">Cảm ơn bạn đã đặt hàng!</h1>
                        <p class="text-gray-500 text-lg">Đơn hàng của bạn đã được tiếp nhận. Chúng tôi sẽ liên hệ sớm nhất.</p>
                        <a href="index.html" class="inline-block px-8 py-4 bg-blue-600 text-white rounded-full font-bold hover:bg-blue-700">Quay lại trang chủ</a>
                    </div>
                `;
            };
        });
    </script>
</body>
</html>
