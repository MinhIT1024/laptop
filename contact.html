<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ - Minh Laptop </title>
    <script src="style.js"></script>
    <style>
        
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            scroll-behavior: smooth;
        }

        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="bg-white text-gray-900">
    <div class="container mx-auto px-4 py-12 space-y-16">
        <div class="text-center max-w-2xl mx-auto space-y-4">
            <h1 class="text-4xl font-extrabold tracking-tight">Liên hệ với chúng tôi</h1>
            <p class="text-gray-500 text-lg">Chúng tôi luôn sẵn sàng lắng nghe và hỗ trợ bạn 24/7.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <div class="space-y-8">
                <div class="p-8 bg-blue-600 text-white rounded-[2.5rem] space-y-8 shadow-xl shadow-blue-200">
                    <h3 class="text-2xl font-bold">Thông tin liên hệ</h3>
                    <div class="space-y-6">
                        <p><strong>Địa chỉ:</strong> 1 Đường DT743, Phường Dĩ An, TP. HCM</p>
                        <p><strong>Điện thoại:</strong> 1900 9999</p>
                        <p><strong>Email:</strong> contact@minhlaptop.vn</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <form onsubmit="event.preventDefault(); alert('Cảm ơn bạn đã liên hệ!'); this.reset();" class="p-10 bg-white border rounded-[2.5rem] space-y-6 shadow-sm">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700">Họ và tên</label>
                            <input required type="text" class="w-full px-5 py-4 border rounded-2xl focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Nguyễn Văn A">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700">Số điện thoại</label>
                            <input required type="tel" class="w-full px-5 py-4 border rounded-2xl focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="0901 234 567">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700">Nội dung tin nhắn</label>
                        <textarea required class="w-full px-5 py-4 border rounded-2xl focus:ring-2 focus:ring-blue-500 focus:outline-none h-40" placeholder="Hãy cho chúng tôi biết bạn cần hỗ trợ gì..."></textarea>
                    </div>
                    <button type="submit" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold text-lg hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">
                        Gửi tin nhắn
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
