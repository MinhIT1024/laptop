<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Đăng nhập - Minh Laptop </title>
    <script src="style.js"></script>
    
</head>
<body class="bg-white text-gray-900">
    <div class="container mx-auto px-4 py-20 flex items-center justify-center">
        <div class="w-full max-w-md space-y-8 p-10 bg-white border rounded-[2.5rem] shadow-2xl shadow-blue-100">
            <div class="text-center space-y-2">
                <h1 id="auth-title" class="text-3xl font-extrabold tracking-tight">Chào mừng trở lại</h1>
                <p id="auth-desc" class="text-gray-500">Nhập thông tin để tiếp tục mua sắm</p>
            </div>

            <form id="auth-form" class="space-y-4">
                <div id="name-field" class="hidden relative">
                    <input type="text" id="reg-name" placeholder="Họ và tên" class="w-full pl-12 pr-4 py-4 border rounded-2xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div class="relative">
                    <input required type="email" id="auth-email" placeholder="Email của bạn" class="w-full pl-12 pr-4 py-4 border rounded-2xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div class="relative">
                    <input required type="password" id="auth-password" placeholder="Mật khẩu" class="w-full pl-12 pr-4 py-4 border rounded-2xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <button type="submit" id="auth-btn" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">
                    Đăng nhập
                </button>
            </form>

            <p class="text-center text-sm text-gray-500">
                <span id="toggle-text">Chưa có tài khoản?</span>
                <button id="toggle-auth" class="ml-1 font-bold text-blue-600 hover:underline">Đăng ký ngay</button>
            </p>

            <div id="demo-info" class="mt-8 p-4 bg-blue-50 border border-blue-100 rounded-2xl text-[10px] text-blue-700">
                <p class="font-bold mb-1 uppercase tracking-wider">Tài khoản demo:</p>
                <p>Admin: theminh@minhlaptop.vn / minhlaptop so 1 so 2 so 3 </p>
                <p>User: Đăng ký bất kỳ / pass: 123456</p>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        let isLogin = true;
        const toggleBtn = document.getElementById('toggle-auth');
        const authForm = document.getElementById('auth-form');
        const nameField = document.getElementById('name-field');
        const authTitle = document.getElementById('auth-title');
        const authDesc = document.getElementById('auth-desc');
        const authBtn = document.getElementById('auth-btn');
        const toggleText = document.getElementById('toggle-text');

        toggleBtn.onclick = () => {
            isLogin = !isLogin;
            nameField.classList.toggle('hidden', isLogin);
            authTitle.textContent = isLogin ? 'Chào mừng trở lại' : 'Tạo tài khoản mới';
            authDesc.textContent = isLogin ? 'Nhập thông tin để tiếp tục mua sắm' : 'Tham gia cùng Minh Laptop ngay hôm nay';
            authBtn.textContent = isLogin ? 'Đăng nhập' : 'Đăng ký ngay';
            toggleText.textContent = isLogin ? 'Chưa có tài khoản?' : 'Đã có tài khoản?';
            toggleBtn.textContent = isLogin ? 'Đăng ký ngay' : 'Đăng nhập';
        };

        authForm.onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;

            if (isLogin) {
                if (email === 'theminh@minhlaptop.vn' && password === 'minhlaptop123') {
                    const admin = { id: 'admin', email, name: 'Quản trị viên', role: 'admin' };
                    localStorage.setItem('user', JSON.stringify(admin));
                    window.location.href = 'admin.html';
                } else {
                    const users = JSON.parse(localStorage.getItem('users') || '[]');
                    const user = users.find(u => u.email === email);
                    if (user && password === '123456') {
                        localStorage.setItem('user', JSON.stringify(user));
                        window.location.href = 'index.html';
                    } else {
                        alert('Email hoặc mật khẩu không chính xác!');
                    }
                }
            } else {
                const name = document.getElementById('reg-name').value;
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                if (users.some(u => u.email === email)) {
                    alert('Email đã tồn tại!');
                    return;
                }
                const newUser = { id: Date.now().toString(), email, name, role: 'user' };
                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));
                localStorage.setItem('user', JSON.stringify(newUser));
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
